{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto my-20 px-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-8 md:p-10 shadow-xs transition-colors duration-300">
        <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white text-center tracking-tight mb-2">Selamat Datang</h2>
        <p class="text-xs text-center text-slate-400 mb-8">Silakan masuk menggunakan kredensial kampus Anda</p>
        
        <form method="POST" class="space-y-5" novalidate>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-1.5">Email Kampus</label>
                <input type="email" name="email" placeholder="nim@mahasiswa.upnvj.ac.id" required class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl text-sm focus:outline-hidden focus:border-[#1dbf73] text-slate-800 dark:text-white transition">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400">Kata Sandi</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-xs text-[#1dbf73] hover:underline">Lupa Sandi?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl text-sm focus:outline-hidden focus:border-[#1dbf73] text-slate-800 dark:text-white transition">
            </div>
            
            <button type="submit" class="w-full bg-[#1dbf73] text-white py-3.5 rounded-xl font-bold text-sm hover:bg-[#10a35e] transition shadow-xs cursor-pointer mt-2">
                Masuk ke Platform
            </button>
        </form>

        <div class="mt-6 text-center pt-4 border-t border-slate-100 dark:border-slate-800">
            <p class="text-sm text-slate-500">Anggota baru? <a href="{{ url_for('auth.register') }}" class="text-[#4a154b] dark:text-purple-400 font-semibold hover:underline">Buat akun di sini</a></p>
        </div>
    </div>
</div>
{% endblock %}
