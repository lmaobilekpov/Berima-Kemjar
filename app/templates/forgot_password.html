{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto my-20 px-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-8 shadow-xs">
        <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-2 text-center tracking-tight">Atur Ulang Sandi</h2>
        <p class="text-xs text-center text-slate-400 mb-6">Masukkan email UPNVJ terdaftar untuk memulihkan akun Anda</p>
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-2 tracking-wider">Email Resmi UPNVJ</label>
                <input type="email" name="email" placeholder="contoh@mahasiswa.upnvj.ac.id" required class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl text-sm focus:outline-hidden focus:border-[#1dbf73] dark:focus:border-[#1dbf73] transition text-slate-800 dark:text-white">
            </div>
            <button type="submit" class="w-full bg-[#1dbf73] text-white py-3.5 rounded-xl font-bold text-sm hover:bg-[#10a35e] transition shadow-xs cursor-pointer">
                Kirim Tautan Pemulihan
            </button>
        </form>
        <div class="text-center mt-6 pt-4 border-t border-slate-100 dark:border-slate-800">
            <a href="{{ url_for('auth.login') }}" class="text-sm font-semibold text-[#4a154b] dark:text-purple-400 hover:underline">Kembali ke Halaman Masuk</a>
        </div>
    </div>
</div>
{% endblock %}
