{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto my-20 px-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
        <div class="flex justify-center mb-6">
            <span class="bg-red-500/10 text-red-500 border border-red-500/20 px-3 py-1 rounded-full text-xs font-black tracking-widest uppercase flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
                Secure Admin Portal
            </span>
        </div>
        
        <h2 class="text-3xl font-extrabold text-white text-center tracking-tight mb-2">Restricted Access</h2>
        <p class="text-xs text-center text-slate-400 mb-8">Authorized System Administrators Only</p>
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1.5">Admin Identity</label>
                <input type="email" name="email" placeholder="admin@secure.portal" required class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm focus:outline-hidden focus:border-red-500 text-white transition placeholder-slate-600">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1.5">Passphrase</label>
                <input type="password" name="password" placeholder="••••••••" required class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-sm focus:outline-hidden focus:border-red-500 text-white transition placeholder-slate-600">
            </div>
            
            <button type="submit" class="w-full bg-red-600 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-red-700 transition shadow-lg shadow-red-600/20 cursor-pointer mt-2">
                Authenticate
            </button>
        </form>
    </div>
</div>
{% endblock %}
